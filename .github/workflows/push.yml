name: Daily Stock Push

on:
  schedule:
    - cron: '30 14 * * *'   # 北京时间 22:30 (UTC 14:30)
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install akshare requests
      - run: python push_stock.py
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
